name: Release

# Déclenché sur tout tag v* poussé.
# Le job ne s'exécute que pour les tags stables (sans tiret : v0.4.1, pas v0.4.0-beta.2).
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          make_latest: true
